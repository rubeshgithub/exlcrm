# nginx/exlcrm.conf
upstream exlcrm_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name exlcrm.com www.exlcrm.com app.exlcrm.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name exlcrm.com www.exlcrm.com;

    # SSL certificates (Let's Encrypt or manual)
    ssl_certificate /etc/letsencrypt/live/exlcrm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exlcrm.com/privkey.pem;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # API proxy
    location /api/ {
        proxy_pass http://exlcrm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://exlcrm_backend/api/v1/health;
        proxy_set_header Host $host;
    }

    # Static files (frontend build)
    location / {
        root /var/www/exlcrm/frontend;
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Subdomain routing for tenants
server {
    listen 443 ssl http2;
    server_name ~^(?<subdomain>[^.]+)\.exlcrm\.com$;
    
    ssl_certificate /etc/letsencrypt/live/exlcrm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exlcrm.com/privkey.pem;
    
    location / {
        proxy_pass http://exlcrm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Subdomain $subdomain;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
